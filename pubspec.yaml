name: tictactoe
description: >-
  Local Tic-Tac-Toe game for Flutter - human vs CPU, Clean Architecture,
  Riverpod, and GoRouter.
publish_to: none

version: 1.0.1+2

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  go_router: ^17.3.0
  shared_preferences: ^2.5.5
  talker: ^5.1.17
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  flutter_hooks: ^0.21.3+1
  hooks_riverpod: ^3.3.2
  device_preview: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.4
  build_runner: ^2.15.0
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.14.0
  mockito: ^5.6.4

# Regenerate Android launcher icons after changing app icon assets:
#   dart run flutter_launcher_icons
#
# Android adaptive icon rules:
# - image_path: full composite (logo + #5857D6) - legacy icons + iOS reference
# - adaptive_icon_background: solid #5857D6 (same as iOS app_icon corners)
# - adaptive_icon_foreground: logo ONLY on transparent canvas (app_icon_foreground.png)
# - adaptive_icon_foreground_inset: 16 (Android safe zone - do NOT use 0 with full app_icon)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  adaptive_icon_background: "#5857D6"
  adaptive_icon_foreground: assets/images/app_icon_foreground.png
  adaptive_icon_foreground_inset: 16

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/home_logo.png
